<!doctype html>
<html lang="ko" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="TrendForce와 MemoryMarket 공개 데이터를 바탕으로 DRAM 현물가, 고정가, 주간 가격 흐름을 확인하는 대시보드"
    />
    <script>
      (() => {
        const valid = (value) => value === 'light' || value === 'dark';
        const requested = new URLSearchParams(location.search).get('theme');
        const key = 'quant-research-theme';
        const legacyKeys = ['quant-calm-theme', 'quant-dashboard-theme', 'dram-price-theme'];
        let stored = null;
        try {
          const canonical = localStorage.getItem(key);
          const legacy = legacyKeys.map((legacyKey) => localStorage.getItem(legacyKey)).find(valid);
          stored = valid(canonical) ? canonical : legacy ?? null;
          if (!valid(canonical) && stored) localStorage.setItem(key, stored);
          legacyKeys.forEach((legacyKey) => localStorage.removeItem(legacyKey));
        } catch (_) {
          // Storage is optional; query and system preferences still apply.
        }
        let preferred = 'light';
        try {
          preferred = typeof matchMedia === 'function' && matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        } catch (_) {
          // Light is the fail-safe when the system preference cannot be read.
        }
        document.documentElement.dataset.theme = valid(requested) ? requested : (stored || preferred || 'light');
      })();
    </script>
    <title>DRAM 가격 랩</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
