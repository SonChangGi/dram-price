name: Update DRAM price data

on:
  workflow_dispatch:
  schedule:
    # Primary daily refresh: 09:20 UTC (18:20 KST). GitHub cron schedules are UTC.
    - cron: '20 9 * * *'
    # Next-day backfill check: 21:00 UTC (06:00 KST on the following local day).
    # This run fetches only when the previous KST day's daily spot data is missing.
    - cron: '0 21 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dram-price-data
  cancel-in-progress: false

jobs:
  update-data:
    # Scheduled source refreshes are best-effort: keep logs/warnings, but do not
    # create GitHub "run failed" mail when public source data is late/unavailable.
    # Manual dispatch stays fail-fast so debugging runs still surface problems.
    continue-on-error: ${{ github.event_name == 'schedule' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Decide whether collection is needed
        id: freshness
        env:
          PYTHONPATH: src
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          args=(--status data/status.json --prices data/prices.json --timezone Asia/Seoul --minimum-daily-spot-rows 2)
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            args+=(--force)
          elif [ "$SCHEDULE" = "0 21 * * *" ]; then
            args+=(--require-daily-date yesterday)
          else
            args+=(--require-daily-date today)
          fi
          python -m dram_tracker.freshness "${args[@]}" | tee "$GITHUB_OUTPUT"
      - name: Report freshness decision
        run: |
          echo "should_collect=${{ steps.freshness.outputs.should_collect }}"
          echo "reason=${{ steps.freshness.outputs.reason }}"
          echo "today=${{ steps.freshness.outputs.today }}"
          echo "generated_at=${{ steps.freshness.outputs.generated_at }}"
          echo "target_date=${{ steps.freshness.outputs.target_date }}"
          echo "daily_observation_count=${{ steps.freshness.outputs.daily_observation_count }}"
      - name: Collect public DRAM data
        id: collect
        if: steps.freshness.outputs.should_collect == 'true'
        continue-on-error: ${{ github.event_name == 'schedule' }}
        env:
          PYTHONPATH: src
        run: python -m dram_tracker.collect --output data
      - name: Report scheduled collection failure
        if: steps.collect.outcome == 'failure' && github.event_name == 'schedule'
        run: |
          echo "::warning::Scheduled DRAM collection failed; keeping the last published data and suppressing run-failed mail."
      - name: Verify requested daily data after collection
        id: verify_target_date
        if: steps.freshness.outputs.should_collect == 'true' && steps.collect.outcome == 'success' && steps.freshness.outputs.target_date != ''
        continue-on-error: ${{ github.event_name == 'schedule' }}
        env:
          PYTHONPATH: src
        run: |
          python -m dram_tracker.freshness \
            --status data/status.json \
            --prices data/prices.json \
            --timezone Asia/Seoul \
            --minimum-daily-spot-rows 2 \
            --require-daily-date "${{ steps.freshness.outputs.target_date }}" \
            --fail-if-collect-needed
      - name: Report scheduled target-date miss
        if: steps.verify_target_date.outcome == 'failure' && github.event_name == 'schedule'
        run: |
          echo "::warning::Scheduled collection finished, but target date ${{ steps.freshness.outputs.target_date }} is still missing; keeping the last published data and skipping commit/deploy."
      - name: Run tests
        id: tests
        if: steps.freshness.outputs.should_collect == 'true' && steps.collect.outcome == 'success' && (steps.freshness.outputs.target_date == '' || steps.verify_target_date.outcome == 'success')
        continue-on-error: ${{ github.event_name == 'schedule' }}
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v
      - name: Report scheduled test failure
        if: steps.tests.outcome == 'failure' && github.event_name == 'schedule'
        run: |
          echo "::warning::Scheduled validation failed after collection; keeping the last published data and skipping commit/deploy."
      - name: Write successful automation marker
        if: steps.freshness.outputs.should_collect == 'true' && steps.collect.outcome == 'success' && (steps.freshness.outputs.target_date == '' || steps.verify_target_date.outcome == 'success') && steps.tests.outcome == 'success'
        env:
          PYTHONPATH: src
        run: |
          python -m dram_tracker.automation_status \
            --output data/automation-status.json \
            --state ok \
            --reason successful_refresh \
            --target-date "${{ steps.freshness.outputs.target_date }}" \
            --source-step tests
      - name: Write scheduled automation failure marker
        id: failure_marker
        if: github.event_name == 'schedule' && (steps.collect.outcome == 'failure' || steps.verify_target_date.outcome == 'failure' || steps.tests.outcome == 'failure')
        env:
          PYTHONPATH: src
        run: |
          git checkout -- data/prices.json data/series.json data/status.json data/summary.json || true
          reason="scheduled_collection_failed"
          source_step="collect"
          if [ "${{ steps.verify_target_date.outcome }}" = "failure" ]; then
            reason="scheduled_target_date_missing"
            source_step="verify_target_date"
          fi
          if [ "${{ steps.tests.outcome }}" = "failure" ]; then
            reason="scheduled_tests_failed"
            source_step="tests"
          fi
          python -m dram_tracker.automation_status \
            --output data/automation-status.json \
            --state degraded \
            --reason "$reason" \
            --target-date "${{ steps.freshness.outputs.target_date }}" \
            --source-step "$source_step"
      - name: Commit scheduled automation failure marker
        id: failure_marker_commit
        if: github.event_name == 'schedule' && (steps.collect.outcome == 'failure' || steps.verify_target_date.outcome == 'failure' || steps.tests.outcome == 'failure')
        run: |
          if git diff --quiet -- data/automation-status.json; then
            echo "marker_changed=false" >> "$GITHUB_OUTPUT"
            echo "Automation failure marker already matches current state."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/automation-status.json
          git commit \
            -m "Expose scheduled DRAM automation degradation" \
            -m "Constraint: preserve last validated price files when scheduled collection/verification fails" \
            -m "Confidence: high" \
            -m "Scope-risk: narrow" \
            -m "Directive: do not commit prices/series/status/summary from failed scheduled runs" \
            -m "Tested: python -m dram_tracker.automation_status writes data/automation-status.json" \
            -m "Skip-Pages-Deploy: update-data-workflow"
          git push
          echo "marker_changed=true" >> "$GITHUB_OUTPUT"
      - name: Prepare degraded static site
        if: github.event_name == 'schedule' && (steps.collect.outcome == 'failure' || steps.verify_target_date.outcome == 'failure' || steps.tests.outcome == 'failure')
        run: |
          rm -rf site
          mkdir -p site
          cp -R web/. site/
          cp -R data site/data
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        if: github.event_name == 'schedule' && (steps.collect.outcome == 'failure' || steps.verify_target_date.outcome == 'failure' || steps.tests.outcome == 'failure')
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        if: github.event_name == 'schedule' && (steps.collect.outcome == 'failure' || steps.verify_target_date.outcome == 'failure' || steps.tests.outcome == 'failure')
        with:
          path: site
      - id: degraded_deployment
        if: github.event_name == 'schedule' && (steps.collect.outcome == 'failure' || steps.verify_target_date.outcome == 'failure' || steps.tests.outcome == 'failure')
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
      - name: Commit data changes
        if: steps.freshness.outputs.should_collect == 'true' && steps.collect.outcome == 'success' && (steps.freshness.outputs.target_date == '' || steps.verify_target_date.outcome == 'success') && steps.tests.outcome == 'success'
        run: |
          if git diff --quiet -- data; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit \
            -m "Preserve current DRAM observations" \
            -m "Constraint: scheduled public-source data refresh" \
            -m "Confidence: high" \
            -m "Scope-risk: narrow" \
            -m "Directive: keep source caveats and status evidence with data refreshes" \
            -m "Tested: python -m dram_tracker.freshness --fail-if-collect-needed and python -m unittest discover -s tests -v after collection" \
            -m "Skip-Pages-Deploy: update-data-workflow"
          git push
      - name: Prepare static site
        if: steps.freshness.outputs.should_collect == 'true' && steps.collect.outcome == 'success' && (steps.freshness.outputs.target_date == '' || steps.verify_target_date.outcome == 'success') && steps.tests.outcome == 'success'
        run: |
          rm -rf site
          mkdir -p site
          cp -R web/. site/
          cp -R data site/data
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        if: steps.freshness.outputs.should_collect == 'true' && steps.collect.outcome == 'success' && (steps.freshness.outputs.target_date == '' || steps.verify_target_date.outcome == 'success') && steps.tests.outcome == 'success'
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        if: steps.freshness.outputs.should_collect == 'true' && steps.collect.outcome == 'success' && (steps.freshness.outputs.target_date == '' || steps.verify_target_date.outcome == 'success') && steps.tests.outcome == 'success'
        with:
          path: site
      - id: deployment
        if: steps.freshness.outputs.should_collect == 'true' && steps.collect.outcome == 'success' && (steps.freshness.outputs.target_date == '' || steps.verify_target_date.outcome == 'success') && steps.tests.outcome == 'success'
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
