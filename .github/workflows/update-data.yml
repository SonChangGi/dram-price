name: Update DRAM price data

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 02:17 UTC. GitHub cron schedules are UTC.
    - cron: '17 2 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dram-price-data
  cancel-in-progress: false

jobs:
  update-data:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Collect public DRAM data
        env:
          PYTHONPATH: src
        run: python -m dram_tracker.collect --output data
      - name: Run tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v
      - name: Commit data changes
        run: |
          if git diff --quiet -- data; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit \
            -m "Preserve current DRAM observations" \
            -m "Constraint: scheduled public-source data refresh" \
            -m "Confidence: high" \
            -m "Scope-risk: narrow" \
            -m "Directive: keep source caveats and status evidence with data refreshes" \
            -m "Tested: python -m unittest discover -s tests -v after collection"
          git push
      - name: Prepare static site
        run: |
          rm -rf site
          mkdir -p site
          cp -R web/. site/
          cp -R data site/data
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
