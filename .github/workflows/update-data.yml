name: Update DRAM price data

on:
  workflow_dispatch:
    # Manual dispatch forces collection through the same validation gates.
  schedule:
    # 09:15 KST weekdays: primary collection after public source publication windows.
    - cron: "15 0 * * 1-5"
    # 11:15/13:15 KST weekdays: 2-hour retries when sources publish late.
    - cron: "15 2 * * 1-5"
    - cron: "15 4 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: dram-price-data
  cancel-in-progress: false

jobs:
  update-data:
    # Scheduled-source guards keep provider outages visible in logs without
    # publishing partial data. Only the final weekday retry escalates repeated
    # degradation, limiting scheduled failure notifications to one per day;
    # manual dispatch stays fail-fast.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Decide whether collection is needed
        id: freshness
        env:
          PYTHONPATH: src
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          args=(--status data/status.json --prices data/prices.json --timezone Asia/Seoul --minimum-daily-spot-rows 2)
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            args+=(--force)
          else
            args+=(--require-daily-date today)
          fi
          python -m dram_tracker.freshness "${args[@]}" | tee "$GITHUB_OUTPUT"
      - name: Report freshness decision
        run: |
          echo "should_collect=${{ steps.freshness.outputs.should_collect }}"
          echo "reason=${{ steps.freshness.outputs.reason }}"
          echo "today=${{ steps.freshness.outputs.today }}"
          echo "generated_at=${{ steps.freshness.outputs.generated_at }}"
          echo "target_date=${{ steps.freshness.outputs.target_date }}"
          echo "daily_observation_count=${{ steps.freshness.outputs.daily_observation_count }}"
      - name: Collect public DRAM data
        id: collect
        if: steps.freshness.outputs.should_collect == 'true'
        continue-on-error: ${{ github.event_name == 'schedule' }}
        env:
          PYTHONPATH: src
        run: python -m dram_tracker.collect --output data
      - name: Report scheduled collection failure
        if: steps.collect.outcome == 'failure' && github.event_name == 'schedule'
        run: |
          echo "::warning::Scheduled DRAM collection failed; keeping the last published data and suppressing run-failed mail."
      - name: Verify requested daily data after collection
        id: verify_target_date
        if: steps.freshness.outputs.should_collect == 'true' && steps.collect.outcome == 'success' && steps.freshness.outputs.target_date != ''
        continue-on-error: ${{ github.event_name == 'schedule' }}
        env:
          PYTHONPATH: src
        run: |
          python -m dram_tracker.freshness \
            --status data/status.json \
            --prices data/prices.json \
            --timezone Asia/Seoul \
            --minimum-daily-spot-rows 2 \
            --require-daily-date "${{ steps.freshness.outputs.target_date }}" \
            --fail-if-collect-needed
      - name: Report scheduled target-date miss
        if: steps.verify_target_date.outcome == 'failure' && github.event_name == 'schedule'
        run: |
          echo "::warning::Scheduled collection finished, but target date ${{ steps.freshness.outputs.target_date }} is still missing; keeping the last published data and skipping commit/deploy."
      - name: Run tests
        id: tests
        if: steps.freshness.outputs.should_collect == 'true' && steps.collect.outcome == 'success' && (steps.freshness.outputs.target_date == '' || steps.verify_target_date.outcome == 'success')
        continue-on-error: ${{ github.event_name == 'schedule' }}
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v
      - name: Report scheduled test failure
        if: steps.tests.outcome == 'failure' && github.event_name == 'schedule'
        run: |
          echo "::warning::Scheduled validation failed after collection; keeping the last published data and skipping commit/deploy."
      - name: Validate public data publication floor
        id: publication
        if: steps.freshness.outputs.should_collect == 'true' && steps.collect.outcome == 'success' && (steps.freshness.outputs.target_date == '' || steps.verify_target_date.outcome == 'success') && steps.tests.outcome == 'success'
        continue-on-error: ${{ github.event_name == 'schedule' }}
        env:
          PYTHONPATH: src
        run: python scripts/validate_publication.py
      - name: Update persistent automation health
        id: health
        if: always() && steps.freshness.outputs.should_collect == 'true'
        env:
          COLLECTION_OUTCOME: ${{ steps.collect.outcome }}
          TARGET_OUTCOME: ${{ steps.verify_target_date.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          PUBLICATION_OUTCOME: ${{ steps.publication.outcome }}
          TARGET_DATE: ${{ steps.freshness.outputs.target_date }}
        run: |
          python scripts/update_automation_health.py \
            --state data/automation-health.json \
            --status data/status.json \
            --collection-outcome "${COLLECTION_OUTCOME:-skipped}" \
            --target-outcome "${TARGET_OUTCOME:-skipped}" \
            --tests-outcome "${TESTS_OUTCOME:-skipped}" \
            --publication-outcome "${PUBLICATION_OUTCOME:-skipped}" \
            --target-date "${TARGET_DATE:-}"
      - name: Commit data changes
        if: steps.freshness.outputs.should_collect == 'true' && steps.collect.outcome == 'success' && (steps.freshness.outputs.target_date == '' || steps.verify_target_date.outcome == 'success') && steps.tests.outcome == 'success' && steps.publication.outcome == 'success' && steps.health.outcome == 'success'
        run: |
          if git diff --quiet -- data; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit \
            -m "Preserve current DRAM observations" \
            -m "Constraint: scheduled/manual public-source refresh must pass freshness, test, and publication gates" \
            -m "Confidence: high" \
            -m "Scope-risk: narrow" \
            -m "Directive: keep source caveats and status evidence with data refreshes" \
            -m "Tested: python -m dram_tracker.freshness --fail-if-collect-needed and python -m unittest discover -s tests -v after collection" \
            -m "Skip-Pages-Deploy: update-data-workflow"
          git push
      - name: Commit automation health without partial market data
        if: always() && steps.freshness.outputs.should_collect == 'true' && (steps.collect.outcome != 'success' || (steps.freshness.outputs.target_date != '' && steps.verify_target_date.outcome != 'success') || steps.tests.outcome != 'success' || steps.publication.outcome != 'success')
        run: |
          if git diff --quiet -- data/automation-health.json; then
            echo "No automation health change to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/automation-health.json
          git commit \
            -m "Record DRAM automation degradation" \
            -m "Constraint: Preserve the last verified market data while tracking repeated provider or validation failures." \
            -m "Directive: Escalate only after the persisted alert threshold is reached." \
            -m "Skip-Pages-Deploy: update-data-workflow"
          git push
      - name: Prepare static site
        if: steps.freshness.outputs.should_collect == 'true' && steps.collect.outcome == 'success' && (steps.freshness.outputs.target_date == '' || steps.verify_target_date.outcome == 'success') && steps.tests.outcome == 'success' && steps.publication.outcome == 'success' && steps.health.outcome == 'success'
        run: |
          rm -rf site
          mkdir -p site
          cp -R web/. site/
          cp -R data site/data
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        if: steps.freshness.outputs.should_collect == 'true' && steps.collect.outcome == 'success' && (steps.freshness.outputs.target_date == '' || steps.verify_target_date.outcome == 'success') && steps.tests.outcome == 'success' && steps.publication.outcome == 'success' && steps.health.outcome == 'success'
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        if: steps.freshness.outputs.should_collect == 'true' && steps.collect.outcome == 'success' && (steps.freshness.outputs.target_date == '' || steps.verify_target_date.outcome == 'success') && steps.tests.outcome == 'success' && steps.publication.outcome == 'success' && steps.health.outcome == 'success'
        with:
          path: site
      - id: deployment
        if: steps.freshness.outputs.should_collect == 'true' && steps.collect.outcome == 'success' && (steps.freshness.outputs.target_date == '' || steps.verify_target_date.outcome == 'success') && steps.tests.outcome == 'success' && steps.publication.outcome == 'success' && steps.health.outcome == 'success'
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
      - name: Escalate repeated automation degradation
        if: >-
          always() &&
          steps.health.outputs.alert_required == 'true' &&
          (github.event_name == 'workflow_dispatch' || github.event.schedule == '15 4 * * 1-5')
        run: |
          echo "::error::DRAM automation degradation reached the persisted alert threshold."
          echo "warning_streak=${{ steps.health.outputs.warning_streak }}"
          echo "blocking_streak=${{ steps.health.outputs.blocking_streak }}"
          exit 1
