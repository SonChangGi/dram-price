name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'data/**'
      - '.github/workflows/deploy-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dram-price-pages
  cancel-in-progress: false

jobs:
  deploy:
    # Manual data refreshes deploy from update-data.yml after collection succeeds.
    # This guard skips only commits explicitly marked as already deployed by update-data.yml.
    if: >-
      github.event_name != 'push' ||
      contains(github.event.head_commit.message, 'Skip-Pages-Deploy: update-data-workflow') == false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Validate backend and public data
        env:
          PYTHONPATH: src
        run: |
          python -m unittest discover -s tests -v
          python scripts/validate_publication.py
      - name: Install frontend dependencies
        run: npm ci --prefix frontend
      - name: Verify and build frontend
        run: npm run verify --prefix frontend
      - name: Combine frontend build and public data
        run: |
          mkdir -p frontend/dist/data
          cp -R data/. frontend/dist/data/
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: frontend/dist
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
